<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صِدق | كاشف النصوص الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">صِدق <i class="fas fa-robot-hide"></i></div>
        <p>كشف الانتحال والنصوص المولدة بالذكاء الاصطناعي</p>
    </header>

    <main class="main-content">
        <textarea id="text-input" placeholder="أدخل النص هنا للفحص (أكثر من 20 كلمة للحصول على نتيجة دقيقة)..."></textarea>
        
        <div class="action-area">
            <button id="scan-btn" onclick="analyzeText()">
                <i class="fas fa-microscope"></i> فحص النص الآن
            </button>
            <button class="clear-btn" onclick="clearText()"><i class="fas fa-trash-alt"></i></button>
        </div>

        <div id="result-card" class="result-card hidden">
            <div class="gauge-container">
                <div class="gauge-ring">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="gauge-progress" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="percentage-text">0%</text>
                    </svg>
                </div>
            </div>
            <h3 id="result-title">تحليل النتيجة...</h3>
            <p id="result-desc"></p>
        </div>
    </main>

    <footer>
        <div class="dev-info">
            <p>مطور بواسطة <b>عبدالرحمن الشديفات</b></p>
            <small>نظام SPA يعتمد على تحليل الأنماط اللغوية اللحظي</small>
        </div>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
