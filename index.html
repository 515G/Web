<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صِـدق | كاشف الانتحال الرقمي</title>
    <!-- استدعاء الخط من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap" rel="stylesheet">
    <!-- ربط ملف التنسيق -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header>
        <h1>منصة صِـدق</h1>
        <p class="subtitle">نظام تحليل النصوص وكشف الذكاء الاصطناعي</p>
    </header>

    <main>
        <!-- منطقة إدخال النص -->
        <textarea id="text-input" placeholder="أدخل النص هنا للفحص (يفضل +20 كلمة لضمان دقة النتائج)..."></textarea>
        
        <div class="stats-bar">عدد الكلمات: <span id="word-count">0</span></div>

        <!-- أزرار الإجراءات السريعة -->
        <div class="action-buttons" style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button type="button" onclick="clearText()" class="btn-secondary">🗑️ مسح</button>
            <button type="button" onclick="pasteText()" class="btn-secondary">📋 لصق</button>
        </div>

        <!-- زر الفحص الأساسي -->
        <button type="button" id="scan-btn" onclick="startAnalysis()">بدء الفحص العميق 🔍</button>

        <!-- منطقة ظهور النتائج -->
        <div id="result-area" class="result-card hidden">
            <h2 id="result-percentage">0.0%</h2>
            <p id="result-label">احتمالية التدخل الآلي</p>
            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>
            <h3 id="result-status"></h3>
            <p id="result-msg"></p>
        </div>
    </main>

    <footer>
        <p>© 2026 جميع الحقوق محفوظة | <b>v2.01</b></p>
    </footer>
</div>

<!-- ربط ملف البرمجة -->
<script src="script.js"></script>
</body>
</html>
