<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صِدق | كاشف النصوص</title>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header>
        <h1>صِدق <span class="owner-mark">J</span></h1>
        <p>كاشف النصوص الذكي - ملكية عبدالرحمن الشديفات</p>
    </header>

    <main>
        <textarea id="text-input" placeholder="أدخل النص هنا للفحص..."></textarea>
        
        <div class="action-area">
            <button type="button" id="scan-btn" onclick="analyzeText()">فحص النص الآن 🔍</button>
            <button type="button" class="clear-btn" onclick="clearText()">مسح</button>
        </div>

        <div id="result-card" class="result-card hidden">
            <div class="score-display">
                <h2 id="percentage-text">0%</h2>
                <h3 id="result-title">جاري التحليل...</h3>
            </div>
            <p id="result-desc"></p>
        </div>
    </main>

    <footer class="rights-section">
        <p>© 2026 جميع الحقوق محفوظة | <b></b></p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
