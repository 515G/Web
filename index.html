<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صِـدق Pro | كاشف الانتحال</title>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo-box">J</div>
        <h1>منصة صِـدق <small>v2.1</small></h1>
    
    </header>

    <main>
        <textarea id="text-input" placeholder="أدخل النص هنا للفحص (يفضل +20 كلمة)..."></textarea>
        
        <div class="stats-bar">عدد الكلمات: <span id="word-count">0</span></div>

        <button type="button" id="scan-btn" onclick="startAnalysis()">بدء الفحص العميق 🔍</button>

        <div id="result-area" class="result-card hidden">
            <h2 id="result-percentage">0%</h2>
            <p id="result-label">احتمال الذكاء الاصطناعي</p>
            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>
            <h3 id="result-status">جاري التحليل...</h3>
            <p id="result-msg"></p>
        </div>
    </main>

    <footer>
        <p>© 2026 جميع الحقوق محفوظة | <b>v2.01</b></p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
